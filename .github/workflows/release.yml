name: Release Desktop App

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            platform: mac
          - os: windows-latest
            platform: win

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Cache Electron binary
        uses: actions/cache@v4
        with:
          path: |
            ~/AppData/Local/electron/Cache
            ~/.cache/electron
          key: electron-${{ runner.os }}-v3-${{ hashFiles('package.json') }}

      - name: Install dependencies (macOS)
        if: matrix.os == 'macos-latest'
        run: pnpm install

      - name: Install dependencies (Windows)
        if: matrix.os == 'windows-latest'
        run: pnpm install
        env:
          ELECTRON_MIRROR: https://npmmirror.com/mirrors/electron/

      - name: Build & Package
        run: npx electron-vite build && npx electron-builder --publish never
        env:
          # 공식 GitHub에서 다운로드하도록 명시 (npmmirror 우선순위 차단)
          ELECTRON_MIRROR: https://github.com/electron/electron/releases/download/v
          ELECTRON_BUILDER_BINARIES_MIRROR: https://github.com/electron-userland/electron-builder-binaries/releases/download/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.platform }}
          path: |
            dist/*.dmg
            dist/*.exe
            dist/*.yml
            dist/*.yaml
          if-no-files-found: ignore

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
          draft: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
